<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Cyberpunk Clicker - Night City</title>
</head>

<body>
    
    <video id="bg-video" autoplay muted loop>
        <source src="assets/videos/night-city.mp4" type="video/mp4">
    </video>

    <div id="overlay"></div>




    <div id="game-container">

        <aside id="panel-resources">

            <h2 id="panel-title">RESSOURCES</h2>

                <div class="resource-item">
                    <span class="resource-emoji">💰</span>
                    <div class="resource-info">
                        <span class="resource-name">Eddies</span>
                        <span class="resource-value" id="display-eddies">0</span>
                    </div>
                </div>

                <div class="resource-item">
                    <span class="resource-emoji">📼</span>
                    <div class="resource-info">
                        <span class="resource-name">Data Shards</span>
                        <span class="resource-value" id="display-shards">0</span>
                    </div>
                </div>

                <div class="resource-item">
                    <span class="resource-emoji">🔧</span>
                    <div class="resource-info">
                        <span class="resource-name">Scrap</span>
                        <span class="resource-value" id="display-scrap">0</span>
                    </div>
                </div>

                <div class="resource-item">
                    <span class="resource-emoji">☠️</span>
                    <div class="resource-info">
                        <span class="resource-name">Influence</span>
                        <span class="resource-value" id="display-influence">0</span>
                    </div>
                </div>

                <div id="production-stats">
                    <p>Par clic : <strong><span id="display-per-click">1</span></strong> ¥</p>
                    <p>Par seconde : <strong><span id="display-per-second">0</span>¥/s</strong></p>
                </div>

                        <!-- Niveau du joueur -->

                <div id="level-display">
                    <p class="level-label">// STATUT</p>
                    <p id="level-title">
                        <span id="level-emoji">🧢</span>
                        <span id="level-name">Gamin des rues</span>
                    </p>
                    <div id="level-bar-container">
                        <div id="level-bar"></div>
                    </div>
                    <p id="level-progress">0 / 1 000 ¥</p>
                </div>

                <!-- Notification de montée de niveau -->
                 
                <div id="levelup-popup" class="hidden">
                    <span id="levelup-emoji">🏆</span>
                    <span id="levelup-text">NIVEAU SUPÉRIEUR</span>
                </div>

        </aside>

    <main id="panel-click">
        <h1 id="game-title">CYBERPUNK 2077<br><span>CLICKER</span></h1>

        <!-- Ressources secondaires cliquables dans le décor -->
        <div id="decor-items">

            <!-- Cliquer sur le terminal génère des Data Shards -->
            <div class="decor-item" id="decor-terminal" title="Scanner le terminal">
                <span class="decor-icon">💾</span>
                <span class="decor-label">TERMINAL</span>
                <span class="decor-gain hidden" id="feedback-shards">+1 Shard</span>
            </div>

            <!-- Cliquer sur l'épave génère du Scrap -->
            <div class="decor-item" id="decor-wreck" title="Fouiller l'épave">
                <span class="decor-icon">🔧</span>
                <span class="decor-label">ÉPAVE</span>
                <span class="decor-gain hidden" id="feedback-scrap">+1 Scrap</span>
            </div>

            <!-- Cliquer sur le contact génère de l'Influence -->
            <div class="decor-item" id="decor-contact" title="Contacter le gang">
                <span class="decor-icon">☠️</span>
                <span class="decor-label">CONTACT</span>
                <span class="decor-gain hidden" id="feedback-influence">+1 Influence</span>
            </div>

        </div>

        <!-- Zone de clic principal -->
        <div id="click-zone">
            <img
                id="click-btn"
                src="assets/neural-chip.png"
                alt="Puce neurale Militech"
                title="Clique pour hacker !"
            >
            <div id="click-feedback"></div>
        </div>

        <p id="click-hint">[ SCANNER LA PUCE ]</p>
    </main>


        <aside id="panel-shop">
            <h2 class="panel-title"></h2>

            <div id="shop-tabs">
                <button class="tab-btn active" id="tab-producers">CONTACTS</button>
                <button class="tab-btn" id="tab-upgrades">IMPLANTS</button>
            </div>

            <div id="shop-producers" class="shop-list">

            </div>

            <div id="shop-upgrades" class="shop-list hidden">

            </div>
        </aside>
    </div> 

                        <script     src="js/data.js"    ></script>
                        <script     src="js/game.js"    ></script>
                        <script     src="js/ui.js"      ></script>
                        <script     src="js/save.js"    ></script>

</body>
</html>
